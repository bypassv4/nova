<html lang="en"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Games</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      margin: 0;
      padding: 2rem;
      background: #0b0d10;
      color: #e6edf3;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 2rem;
      color: #7c5cff;
    }

    /* Game grid */
    .game-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center; /* center all rows */
      gap: 1.5rem;
      max-width: 1200px; /* keeps ~6 per row depending on screen size */
      width: 100%;
    }

    /* Game card */
    .game-card {
      width: 160px;
      background: #12161c;
      border: 2px solid #243041;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }

    .game-card:hover {
      transform: translateY(-5px) scale(1.02);
      border-color: #7c5cff;
      box-shadow: 0 6px 16px rgba(124,92,255,0.4);
    }

    .game-card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }

    .game-card span {
      padding: 0.75rem;
      font-size: 1rem;
      text-align: center;
    }

    /* Light Mode */
    body.light {
      background: #f5f5f7;
      color: #111;
    }
    body.light .game-card {
      background: #fff;
      border: 2px solid #ddd;
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
    }
    body.light .game-card:hover {
      border-color: #00cc66;
      box-shadow: 0 6px 16px rgba(0,204,102,0.3);
    }

    /* Fullscreen overlay */
    #gameOverlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: none;
      flex-direction: column;
      z-index: 100;
    }
    #gameOverlay iframe {
      flex: 1;
      width: 100%;
      height: 100%;
      border: none;
    }
    #closeBtn {
      position: absolute;
      top: 15px;
      right: 20px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.2s;
      z-index: 101;
    }
    #closeBtn:hover {
      background: rgba(124,92,255,0.8);
    }
  </style>
</head>

  <!-- Fullscreen overlay -->
  <div id="gameOverlay">
    <button id="closeBtn" onclick="closeGame()">Close</button>
    <iframe id="gameFrame"></iframe>
  </div>

  <script>
    // Apply theme from sessionStorage
    function applyTheme() {
      const theme = sessionStorage.getItem('theme') || 'dark';
      document.body.classList.remove('dark','light');
      document.body.classList.add(theme);
    }
    applyTheme();

    // Launch game
    function launchGame(url) {
      const overlay = document.getElementById('gameOverlay');
      const frame = document.getElementById('gameFrame');
      frame.src = url;
      overlay.style.display = 'flex';
    }

    // Close game
    function closeGame() {
      const overlay = document.getElementById('gameOverlay');
      const frame = document.getElementById('gameFrame');
      frame.src = '';
      overlay.style.display = 'none';
    }
  </script>
